<div class="bg-gray-700 p-4 px-8 flex gap-2 rounded-t-3xl">
  <div class="p-2 rounded-full bg-green-500"></div>
  <div class="p-2 rounded-full bg-orange-500"></div>
  <div class="p-2 rounded-full bg-red-500"></div>
</div>
<div
  class="border-2 border-gray-700 bg-orange-50 h-[calc(100vh-200px)] rounded-b-3xl relative overflow-hidden"
>
  <!-- Carousel Container -->
  <div class="relative w-full h-full">
    <!-- Slides -->
    <div
      *ngFor="let slide of slides; let i = index"
      class="absolute inset-0 transition-opacity duration-500 ease-in-out flex items-center justify-center"
      [class.opacity-100]="currentSlide === i"
      [class.opacity-0]="currentSlide !== i"
    >
      <div
        class="text-center px-8 flex flex-col justify-center items-center max-w-3xl"
      >
        <!-- <div class="text-6xl mb-4">{{ slide.icon }}</div> -->
        <img [src]="slide.icon" [alt]="slide.title" class="w-[200px] lg:w-[400px]" />
        <h3 class="text-2xl lg:text-5xl font-bold text-gray-800 mb-4">{{ slide.title }}</h3>
        <p class="text-gray-600 text-base lg:text-xl">{{ slide.description }}</p>
      </div>
    </div>
  </div>

  <!-- Navigation Dots -->
  <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2">
    <button
      *ngFor="let slide of slides; let i = index"
      (click)="goToSlide(i)"
      class="w-3 h-3 rounded-full transition-all duration-300"
      [class.bg-gray-800]="currentSlide === i"
      [class.w-8]="currentSlide === i"
      [class.bg-gray-400]="currentSlide !== i"
      [attr.aria-label]="'Go to slide ' + (i + 1)"
    ></button>
  </div>
