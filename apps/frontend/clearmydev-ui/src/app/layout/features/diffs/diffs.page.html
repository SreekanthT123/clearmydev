
<div class="h-[calc(100vh-80px)] w-screen flex flex-col lg:flex-row">
  <div class="w-full lg:w-1/2 border-r p-4">
    <app-diff-input
      (submitDiff)="onSubmit($event)"
      [isLoading]="isLoading()"
    ></app-diff-input>
  </div>
  <div class="w-full lg:w-1/2 border-r p-4">
    <app-diff-output
      [error]="errormessage()"
      [isLoading]="isLoading()"
      [result]="explanation()"
    ></app-diff-output>
  </div>
</div>
